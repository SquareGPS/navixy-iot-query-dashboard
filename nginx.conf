events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # SPA routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy to backend
        location /api {
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Data exports (re-queried + streamed server-side) can legitimately
            # run longer than nginx's default 60s read timeout: the SQL query
            # alone may use up to its statement_timeout before the first xlsx
            # byte is sent. Without this, large exports return 504. (This does
            # NOT touch client_max_body_size — request bodies stay small.)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Stream responses straight through. With the default (buffering on)
            # nginx would re-buffer the multi-hundred-MB streamed xlsx into
            # proxy_temp on disk, undoing the flat-memory/immediate-flush intent
            # of the streaming exporter (and SSE/upgrade responses above).
            proxy_buffering off;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://backend:3001/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}

